<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美味飯捲點餐系統</title>
    <!-- 引入 Tailwind CSS (免安裝版本) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-800 pb-24 md:pb-0">

    <!-- 頂部導覽列 -->
    <header class="bg-red-600 text-white shadow-md sticky top-0 z-30">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="window.toggleView('menu')">
                <i class="fa-solid fa-utensils text-xl"></i>
                <h1 class="text-xl font-bold tracking-wider">美味飯捲點餐</h1>
            </div>
            
            <button id="nav-btn" onclick="window.toggleView()" class="flex items-center space-x-2 bg-red-700 hover:bg-red-800 transition px-4 py-2 rounded-lg text-sm font-medium">
                <!-- 動態按鈕內容 -->
            </button>
        </div>
    </header>

    <!-- 浮動提示訊息 (Toast) -->
    <div id="toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-lg z-50 flex items-center space-x-2 transition-all duration-300 opacity-0 pointer-events-none translate-y-[-20px]">
        <i class="fa-solid fa-circle-check text-green-400"></i>
        <span id="toast-msg">提示訊息</span>
    </div>

    <!-- 主要內容區 -->
    <main class="max-w-6xl mx-auto p-4 flex flex-col md:flex-row gap-6 mt-4">
        
        <!-- ================= 視圖 1: 點餐與菜單 ================= -->
        <div id="view-menu" class="flex flex-col md:flex-row gap-6 w-full">
            <!-- 菜單區域 -->
            <div class="flex-1">
                <h2 class="text-2xl font-bold mb-4 text-slate-800 border-b-2 border-red-200 pb-2 inline-block">精選菜單</h2>
                <div id="menu-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- 菜單項目由 JS 動態生成 -->
                </div>
            </div>

            <!-- 購物車側邊欄 -->
            <div class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-20 md:relative md:w-80 md:bg-white md:rounded-xl md:shadow-md md:border md:border-slate-100 md:p-5 md:h-fit md:sticky md:top-24">
                <div class="flex items-center space-x-2 mb-4 text-slate-800">
                    <i class="fa-solid fa-cart-shopping text-lg"></i>
                    <h2 class="text-xl font-bold">購物車</h2>
                </div>

                <div id="cart-empty" class="text-center py-8 text-slate-400 block">
                    <i class="fa-solid fa-cart-shopping text-5xl mb-3 opacity-20"></i>
                    <p>購物車是空的</p>
                    <p class="text-sm mt-1">快來點些美味的飯捲吧！</p>
                </div>

                <div id="cart-content" class="hidden flex-col h-full max-h-[40vh] md:max-h-none">
                    <div id="cart-items" class="flex-1 overflow-y-auto pr-2 space-y-3 mb-4 max-h-[30vh] md:max-h-[400px]">
                        <!-- 購物車項目由 JS 動態生成 -->
                    </div>
                    
                    <div class="border-t border-slate-200 pt-4 mt-auto">
                        <div class="flex justify-between items-center mb-4 text-lg font-bold">
                            <span>總計金額:</span>
                            <span id="cart-total" class="text-red-600 text-2xl">$0</span>
                        </div>
                        <button id="submit-btn" onclick="window.submitOrder()" class="w-full py-3 rounded-lg font-bold text-white transition flex justify-center items-center space-x-2 bg-red-600 hover:bg-red-700">
                            <i class="fa-solid fa-circle-check"></i>
                            <span>確認送出訂單</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= 視圖 2: 所有訂單 ================= -->
        <div id="view-orders" class="flex-1 w-full max-w-3xl mx-auto hidden">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold text-slate-800 flex items-center space-x-2">
                    <i class="fa-solid fa-list text-red-600"></i>
                    <span>所有顧客訂單</span>
                </h2>
                <span id="orders-count" class="bg-red-100 text-red-800 text-sm font-medium px-3 py-1 rounded-full">
                    共 0 筆
                </span>
            </div>

            <div id="orders-empty" class="bg-white rounded-xl shadow-sm border border-slate-100 p-12 text-center text-slate-400 hidden">
                <i class="fa-solid fa-utensils text-6xl mb-4 opacity-20"></i>
                <p class="text-lg">目前還沒有任何訂單紀錄</p>
            </div>

            <div id="orders-list" class="space-y-4">
                <!-- 訂單紀錄由 JS 動態生成 -->
            </div>
        </div>
    </main>

    <!-- 載入 Firebase (原生 JS ES Module 寫法) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 1. 系統與 Firebase 初始設定
        // ==========================================
        // 若您部署到 Cloudflare，請將下方 `firebaseConfig` 替換為您的 Firebase 專案設定檔：
        // 例如：const myFirebaseConfig = { apiKey: "AIza...", authDomain: "...", projectId: "..." };
        let firebaseConfig = {};
        try {
            firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        } catch (e) {
            console.warn("未偵測到環境預設的 Firebase 設定。如果您要自行部署，請在程式碼中填入您的 Config。");
        }
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'rice-roll-vanilla-app';
        let app, auth, db, currentUser = null;
        
        if (Object.keys(firebaseConfig).length > 0) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        // ==========================================
        // 2. 菜單資料
        // ==========================================
        const MENU_ITEMS = [
            { id: '1', name: '肉鬆飯捲', enName: 'Pork floss', price: 50 },
            { id: '2', name: '脆麵飯捲', enName: 'Fleshy', price: 50 },
            { id: '3', name: '火腿飯捲', enName: 'Ham', price: 50 },
            { id: '4', name: '熱狗飯捲', enName: 'Hot dog', price: 50 },
            { id: '5', name: '蟹條飯捲', enName: 'Crab stick', price: 50 },
            { id: '6', name: '韓式泡菜飯捲', enName: 'Kimchi', price: 55 },
            { id: '7', name: '培根飯捲', enName: 'Bacon', price: 55 },
            { id: '8', name: '薯餅飯捲', enName: 'Potato cake', price: 55 },
            { id: '9', name: '鮪魚飯捲', enName: 'Tuna', price: 60 },
            { id: '10', name: '夏威夷飯捲', enName: 'Ham pineapple', price: 65 },
            { id: '11', name: '煙燻雞肉飯捲', enName: 'Smoked chicken', price: 65 },
            { id: '12', name: '日式烤鰻飯捲', enName: 'Grilled eel', price: 70 },
            { id: '13', name: '辣子雞肉飯捲', enName: 'Spicy chicken', price: 65 },
            { id: '14', name: '檸檬雞柳飯捲', enName: 'Lemon chicken', price: 65 },
            { id: '15', name: '辣味卡拉飯捲', enName: 'Spicy karaoke', price: 65 },
            { id: '16', name: '墨西哥辣椒雞飯捲', enName: 'Jalapeno pepper chicken', price: 70 },
            { id: '17', name: '起司豬排飯捲', enName: 'Cheese pork', price: 65 },
            { id: '18', name: '照燒豬肉飯捲', enName: 'Teriyaki pork', price: 65 },
            { id: '19', name: '打拋豬肉飯捲', enName: 'Thai pork', price: 65 },
            { id: '20', name: '黑胡椒豬柳飯捲', enName: 'Pepper pork', price: 65 },
        ];

        // ==========================================
        // 3. 狀態管理 (State)
        // ==========================================
        let currentView = 'menu'; // 'menu' 或 'orders'
        let cart = [];
        let ordersList = [];
        let isSubmitting = false;

        // ==========================================
        // 4. UI 渲染邏輯
        // ==========================================
        
        // 渲染菜單
        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = MENU_ITEMS.map(item => `
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-4 hover:shadow-md transition flex justify-between items-center group">
                    <div>
                        <h3 class="text-lg font-bold text-slate-800 group-hover:text-red-600 transition">${item.name}</h3>
                        <p class="text-xs text-slate-400 mb-2">${item.enName}</p>
                        <span class="text-red-600 font-bold text-lg">$${item.price}</span>
                    </div>
                    <button 
                        onclick="window.addToCart('${item.id}')"
                        class="bg-red-50 text-red-600 hover:bg-red-600 hover:text-white w-10 h-10 rounded-full transition flex items-center justify-center"
                        title="加入購物車"
                    >
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
            `).join('');
        }

        // 渲染購物車
        function renderCart() {
            const emptyEl = document.getElementById('cart-empty');
            const contentEl = document.getElementById('cart-content');
            const itemsEl = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');

            if (cart.length === 0) {
                emptyEl.classList.remove('hidden');
                emptyEl.classList.add('block');
                contentEl.classList.remove('flex');
                contentEl.classList.add('hidden');
                return;
            }

            emptyEl.classList.remove('block');
            emptyEl.classList.add('hidden');
            contentEl.classList.remove('hidden');
            contentEl.classList.add('flex');

            let total = 0;
            itemsEl.innerHTML = cart.map(c => {
                total += c.item.price * c.quantity;
                return `
                    <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg border border-slate-100">
                        <div class="flex-1">
                            <div class="font-medium text-slate-700">${c.item.name}</div>
                            <div class="text-red-600 text-sm">$${c.item.price}</div>
                        </div>
                        <div class="flex items-center space-x-2 bg-white rounded-md border border-slate-200">
                            <button onclick="window.updateQuantity('${c.item.id}', -1)" class="p-2 text-slate-500 hover:text-red-500 w-8 flex items-center justify-center">
                                <i class="fa-solid ${c.quantity === 1 ? 'fa-trash-can text-sm' : 'fa-minus text-xs'}"></i>
                            </button>
                            <span class="w-4 text-center font-medium">${c.quantity}</span>
                            <button onclick="window.updateQuantity('${c.item.id}', 1)" class="p-2 text-slate-500 hover:text-green-500 w-8 flex items-center justify-center">
                                <i class="fa-solid fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            totalEl.innerText = `$${total}`;
        }

        // 渲染訂單列表
        function renderOrders() {
            const listEl = document.getElementById('orders-list');
            const emptyEl = document.getElementById('orders-empty');
            const countEl = document.getElementById('orders-count');
            
            countEl.innerText = `共 ${ordersList.length} 筆`;

            if (ordersList.length === 0) {
                emptyEl.classList.remove('hidden');
                listEl.innerHTML = '';
                return;
            }

            emptyEl.classList.add('hidden');
            
            listEl.innerHTML = ordersList.map(order => {
                const dateText = order.createdAt ? 
                    new Date(order.createdAt.toMillis()).toLocaleString('zh-TW', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : 
                    '剛剛';
                
                const itemsHtml = order.items.map(c => `
                    <div class="flex justify-between items-center text-sm bg-slate-50 p-2 rounded border border-slate-100">
                        <span class="text-slate-700 font-medium">${c.item.name}</span>
                        <div class="text-slate-500">
                            $${c.item.price} x <span class="font-bold text-slate-800">${c.quantity}</span>
                        </div>
                    </div>
                `).join('');

                return `
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 hover:shadow-md transition">
                        <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center border-b border-slate-100 pb-3 mb-3 gap-2">
                            <div class="flex items-center space-x-3 text-slate-500 text-sm">
                                <span class="bg-slate-100 px-2 py-1 rounded-md font-mono text-xs">
                                    #${order.id.slice(-6).toUpperCase()}
                                </span>
                                <div class="flex items-center space-x-1">
                                    <i class="fa-regular fa-clock"></i>
                                    <span>${dateText}</span>
                                </div>
                            </div>
                            <div class="font-bold text-red-600 bg-red-50 px-3 py-1 rounded-full w-fit">
                                總額: $${order.totalAmount}
                            </div>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                            ${itemsHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 渲染導覽列按鈕
        function updateNav() {
            const navBtn = document.getElementById('nav-btn');
            if (currentView === 'menu') {
                navBtn.innerHTML = `
                    <i class="fa-solid fa-list"></i>
                    <span class="hidden sm:inline">檢視所有訂單</span>
                    <span class="sm:hidden">訂單</span>
                    ${ordersList.length > 0 ? `<span class="ml-1 bg-white text-red-600 text-xs rounded-full px-1.5 py-0.5 font-bold">${ordersList.length}</span>` : ''}
                `;
            } else {
                navBtn.innerHTML = `
                    <i class="fa-solid fa-chevron-left"></i>
                    <span>返回菜單</span>
                `;
            }
        }

        // ==========================================
        // 5. 商業邏輯 (掛載到 window 供 HTML onclick 呼叫)
        // ==========================================
        window.toggleView = (forceView = null) => {
            if (forceView) {
                currentView = forceView;
            } else {
                currentView = currentView === 'menu' ? 'orders' : 'menu';
            }
            
            const viewMenu = document.getElementById('view-menu');
            const viewOrders = document.getElementById('view-orders');

            if (currentView === 'menu') {
                viewMenu.classList.remove('hidden');
                viewMenu.classList.add('flex');
                viewOrders.classList.add('hidden');
            } else {
                viewMenu.classList.add('hidden');
                viewMenu.classList.remove('flex');
                viewOrders.classList.remove('hidden');
            }
            updateNav();
        };

        window.addToCart = (itemId) => {
            const item = MENU_ITEMS.find(i => i.id === itemId);
            if (!item) return;

            const existingIndex = cart.findIndex(c => c.item.id === itemId);
            if (existingIndex > -1) {
                cart[existingIndex].quantity += 1;
            } else {
                cart.push({ item, quantity: 1 });
            }
            renderCart();
            
            // 加入購物車的小動畫回饋
            showToast(`已將 ${item.name} 加入購物車`);
        };

        window.updateQuantity = (itemId, delta) => {
            const existingIndex = cart.findIndex(c => c.item.id === itemId);
            if (existingIndex > -1) {
                cart[existingIndex].quantity += delta;
                if (cart[existingIndex].quantity <= 0) {
                    cart.splice(existingIndex, 1);
                }
            }
            renderCart();
        };

        window.showToast = (msg) => {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            toastMsg.innerText = msg;
            
            toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-[-20px]');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-[-20px]');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        };

        window.submitOrder = async () => {
            if (cart.length === 0 || !db || isSubmitting) return;
            
            isSubmitting = true;
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i><span>處理中...</span>`;
            submitBtn.classList.add('bg-slate-400', 'cursor-not-allowed');
            submitBtn.classList.remove('bg-red-600', 'hover:bg-red-700');

            try {
                // 如果沒有登入（外部環境自己部署時），嘗試匿名登入
                if (!currentUser && auth) {
                    await signInAnonymously(auth);
                }

                const uid = currentUser ? currentUser.uid : 'guest';
                const ordersRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                const totalAmount = cart.reduce((sum, c) => sum + (c.item.price * c.quantity), 0);
                
                await addDoc(ordersRef, {
                    items: cart,
                    totalAmount: totalAmount,
                    createdAt: serverTimestamp(),
                    userId: uid,
                    status: 'pending'
                });
                
                cart = [];
                renderCart();
                window.showToast('🎉 訂單送出成功！');
                window.toggleView('orders'); // 切換到訂單列表
                
            } catch (error) {
                console.error("送出訂單失敗:", error);
                window.showToast('❌ 發生錯誤，請稍後再試。');
            } finally {
                isSubmitting = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-circle-check"></i><span>確認送出訂單</span>`;
                submitBtn.classList.remove('bg-slate-400', 'cursor-not-allowed');
                submitBtn.classList.add('bg-red-600', 'hover:bg-red-700');
            }
        };

        // ==========================================
        // 6. 初始化 Firebase 登入與資料綁定
        // ==========================================
        async function initApp() {
            renderMenu();
            renderCart();
            updateNav();

            if (!auth) {
                console.warn("無法連線到資料庫，以離線模式顯示介面。");
                return;
            }

            try {
                // 自動處理登入驗證
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Firebase Auth 錯誤:", e);
            }

            // 監聽登入狀態與資料
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) {
                    const ordersRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                    
                    onSnapshot(ordersRef, (snapshot) => {
                        ordersList = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                        
                        // 依照時間由新到舊排序
                        ordersList.sort((a, b) => {
                            const timeA = a.createdAt?.toMillis() || 0;
                            const timeB = b.createdAt?.toMillis() || 0;
                            return timeB - timeA;
                        });
                        
                        renderOrders();
                        updateNav(); // 更新按鈕上的數量徽章
                    }, (error) => {
                        console.error("讀取訂單失敗:", error);
                    });
                }
            });
        }

        // 啟動系統
        initApp();

    </script>
</body>
</html>
